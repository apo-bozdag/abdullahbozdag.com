<!DOCTYPE html>
<head>
    <title>Abdullah Bozdağ</title>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="chrome=1"/>
    <meta name="description" content="Personal Website">
    <meta name="keywords" content="Abdullah Bozdağ" />
    <meta name="author" content="Abdullah Bozdağ" />
    <link rel='icon' href='favicon.ico' type='image/x-icon' />
    <meta name="viewport" content="width=device-width, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <link href="https://fonts.googleapis.com/css?family=Inconsolata" rel="stylesheet" type="text/css"/>
    <link href="css/style.css" rel="stylesheet" type="text/css"/>
</head>
<body>
<div id="container">
    <output></output>
    <div id="input-line" class="input-line">
        <div class="prompt"></div>
        <div><input class="cmdline" autofocus/></div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-2.1.1.min.js"></script>
<script src="js/terminal.js"></script>

<div class="clock-container">
    <svg viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="45"/>
        <g>
            <rect class="hour" x="47.5" y="12.5" width="5" height="40" rx="2.5" ry="2.55"/>
            <rect class="min" x="48.5" y="12.5" width="3" height="40" rx="2" ry="2"/>
            <line class="sec" x1="50" y1="50" x2="50" y2="16"/>
        </g>
    </svg>
</div>

<script>
    $(function () {

        $('.prompt').html('[abdullah@website] # ');

        // Initialize a new terminal object
        let term = new Terminal('#input-line .cmdline', '#container output');
        term.init();

        // Update the clock every second
        setInterval(function () {
            function r(cls, deg) {
                $('.' + cls).attr('transform', 'rotate(' + deg + ' 50 50)')
            }

            var d = new Date()
            r("sec", 6 * d.getSeconds())
            r("min", 6 * d.getMinutes())
            r("hour", 30 * (d.getHours() % 12) + d.getMinutes() / 2)
        }, 1000);

    });
</script>

</body>
</html>
